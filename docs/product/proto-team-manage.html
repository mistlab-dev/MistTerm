<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MistTerm - 团队协作</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; background: #f0f0f0; padding: 20px; }
        .window { background: #fff; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.25); width: 1000px; height: 650px; margin: 0 auto; display: flex; flex-direction: column; overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 18px; font-weight: 500; }
        .header-actions { display: flex; gap: 12px; }
        .header-btn { background: rgba(255,255,255,0.2); border: none; color: #fff; padding: 8px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; }
        .main { flex: 1; padding: 24px; overflow-y: auto; }
        .team-header { background: #f8f9fa; padding: 24px; border-radius: 8px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; }
        .team-info h2 { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 8px; }
        .team-info p { font-size: 13px; color: #666; }
        .team-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; margin-bottom: 24px; }
        .stat-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 20px; text-align: center; }
        .stat-icon { font-size: 32px; margin-bottom: 8px; }
        .stat-value { font-size: 24px; font-weight: 600; color: #667eea; margin-bottom: 4px; }
        .stat-label { font-size: 12px; color: #999; }
        .members-section { margin-bottom: 24px; }
        .section-title { font-size: 14px; font-weight: 600; color: #333; margin-bottom: 12px; }
        .members-table { width: 100%; border-collapse: collapse; }
        .members-table th { text-align: left; padding: 12px; background: #f8f9fa; font-size: 12px; font-weight: 600; color: #666; border-bottom: 1px solid #e0e0e0; }
        .members-table td { padding: 12px; font-size: 13px; border-bottom: 1px solid #e0e0e0; }
        .member-avatar { width: 32px; height: 32px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; margin-right: 8px; }
        .member-name { display: inline-flex; align-items: center; }
        .role-badge { padding: 2px 8px; border-radius: 12px; font-size: 11px; }
        .role-admin { background: #e8f0fe; color: #1967d2; }
        .role-member { background: #f0f0f0; color: #666; }
        .permissions-section { margin-bottom: 24px; }
        .perm-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .perm-card { background: #f8f9fa; padding: 16px; border-radius: 8px; }
        .perm-title { font-size: 13px; font-weight: 600; color: #333; margin-bottom: 12px; }
        .perm-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; font-size: 12px; color: #666; }
        .perm-toggle { width: 40px; height: 20px; background: #667eea; border-radius: 10px; position: relative; }
        .perm-toggle::after { content: ''; position: absolute; right: 2px; top: 2px; width: 16px; height: 16px; background: #fff; border-radius: 50%; }
    </style>
</head>
<body>
    <div class="window">
        <div class="header">
            <h1>👥 团队协作</h1>
            <div class="header-actions">
                <button class="header-btn">邀请成员</button>
                <button class="header-btn">设置</button>
            </div>
        </div>
        <div class="main">
            <div class="team-header">
                <div class="team-info">
                    <h2>技术部研发一组</h2>
                    <p>创建人：张三 | 创建时间：2025-01-15</p>
                </div>
                <button class="header-btn" style="background: #667eea;">+ 邀请成员</button>
            </div>
            <div class="team-stats">
                <div class="stat-card">
                    <div class="stat-icon">👥</div>
                    <div class="stat-value">12</div>
                    <div class="stat-label">团队成员</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📝</div>
                    <div class="stat-value">156</div>
                    <div class="stat-label">共享片段</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🔐</div>
                    <div class="stat-value">45</div>
                    <div class="stat-label">共享凭证</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📁</div>
                    <div class="stat-value">23</div>
                    <div class="stat-label">团队文件</div>
                </div>
            </div>
            <div class="members-section">
                <div class="section-title">团队成员</div>
                <table class="members-table">
                    <thead>
                        <tr>
                            <th>成员</th>
                            <th>角色</th>
                            <th>加入时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><span class="member-name"><span class="member-avatar">张</span>张三</span></td>
                            <td><span class="role-badge role-admin">管理员</span></td>
                            <td>2025-01-15</td>
                            <td>-</td>
                        </tr>
                        <tr>
                            <td><span class="member-name"><span class="member-avatar">李</span>李明</span></td>
                            <td><span class="role-badge role-member">成员</span></td>
                            <td>2025-02-20</td>
                            <td><button style="padding: 4px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 11px; cursor: pointer;">编辑</button></td>
                        </tr>
                        <tr>
                            <td><span class="member-name"><span class="member-avatar">王</span>王芳</span></td>
                            <td><span class="role-badge role-member">成员</span></td>
                            <td>2025-03-10</td>
                            <td><button style="padding: 4px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 11px; cursor: pointer;">编辑</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="permissions-section">
                <div class="section-title">权限配置</div>
                <div class="perm-grid">
                    <div class="perm-card">
                        <div class="perm-title">片段管理</div>
                        <div class="perm-item"><span>创建片段</span><div class="perm-toggle"></div></div>
                        <div class="perm-item"><span>编辑他人片段</span><div class="perm-toggle" style="background: #ccc;"></div></div>
                        <div class="perm-item"><span>删除片段</span><div class="perm-toggle" style="background: #ccc;"></div></div>
                    </div>
                    <div class="perm-card">
                        <div class="perm-title">凭证管理</div>
                        <div class="perm-item"><span>创建凭证</span><div class="perm-toggle"></div></div>
                        <div class="perm-item"><span>查看密码</span><div class="perm-toggle" style="background: #ccc;"></div></div>
                        <div class="perm-item"><span>导出凭证</span><div class="perm-toggle" style="background: #ccc;"></div></div>
                    </div>
                    <div class="perm-card">
                        <div class="perm-title">文件管理</div>
                        <div class="perm-item"><span>上传文件</span><div class="perm-toggle"></div></div>
                        <div class="perm-item"><span>删除文件</span><div class="perm-toggle" style="background: #ccc;"></div></div>
                        <div class="perm-item"><span>管理权限</span><div class="perm-toggle" style="background: #ccc;"></div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
