<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MistTerm - 凭证管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; background: #f0f0f0; padding: 20px; }
        .window { background: #fff; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.25); width: 1000px; height: 650px; margin: 0 auto; display: flex; flex-direction: column; overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 18px; font-weight: 500; }
        .header-actions { display: flex; gap: 12px; }
        .header-btn { background: rgba(255,255,255,0.2); border: none; color: #fff; padding: 8px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; }
        .main { flex: 1; display: flex; }
        .sidebar { width: 200px; background: #fafafa; border-right: 1px solid #e0e0e0; padding: 16px 0; }
        .search-box { padding: 0 16px 16px; }
        .search-input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
        .sidebar-item { padding: 10px 16px; font-size: 13px; color: #555; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .sidebar-item:hover { background: #f0f0f0; }
        .sidebar-item.active { background: #e8f0fe; color: #1967d2; }
        .sidebar-item .count { margin-left: auto; font-size: 11px; color: #999; background: #f0f0f0; padding: 2px 8px; border-radius: 10px; }
        .sidebar-item.active .count { background: #d3e3fd; color: #1967d2; }
        .content { flex: 1; display: flex; flex-direction: column; }
        .content-header { padding: 16px 24px; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center; }
        .content-title { font-size: 16px; font-weight: 600; color: #333; }
        .stats { display: flex; gap: 24px; }
        .stat-item { text-align: center; }
        .stat-value { font-size: 24px; font-weight: 600; color: #667eea; }
        .stat-label { font-size: 12px; color: #999; margin-top: 4px; }
        .credentials-list { flex: 1; overflow-y: auto; padding: 16px 24px; }
        .cred-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .cred-card:hover { border-color: #667eea; box-shadow: 0 4px 12px rgba(102,126,234,0.1); }
        .cred-info { display: flex; gap: 16px; align-items: center; }
        .cred-icon { width: 48px; height: 48px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .cred-details { flex: 1; }
        .cred-name { font-size: 14px; font-weight: 600; color: #333; margin-bottom: 4px; }
        .cred-meta { font-size: 12px; color: #999; display: flex; gap: 16px; align-items: center; }
        .cred-actions { display: flex; gap: 8px; }
        .action-btn { background: #fff; border: 1px solid #ddd; padding: 8px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; }
        .action-btn:hover { background: #f5f5f5; }
        .action-btn.primary { background: #667eea; border-color: #667eea; color: #fff; }
        .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-right: 6px; }
        .tag.team { background: #e8f0fe; color: #1967d2; }
        .tag.lock { background: #fce8e6; color: #c5221f; }
    </style>
</head>
<body>
    <div class="window">
        <div class="header">
            <h1>🔐 凭证库</h1>
            <div class="header-actions">
                <button class="header-btn">+ 新增</button>
                <button class="header-btn">导入</button>
            </div>
        </div>
        <div class="main">
            <div class="sidebar">
                <div class="search-box">
                    <input type="text" class="search-input" placeholder="🔍 搜索凭证...">
                </div>
                <div class="sidebar-item active">🖥️ 服务器账号 <span class="count">23</span></div>
                <div class="sidebar-item">🗄️ 数据库账号 <span class="count">12</span></div>
                <div class="sidebar-item">🔑 SSH 密钥 <span class="count">8</span></div>
                <div class="sidebar-item">🔐 API 密钥 <span class="count">5</span></div>
                <div class="sidebar-item">☁️ 第三方服务 <span class="count">3</span></div>
                <div class="sidebar-item" style="margin-top: 20px; border-top: 1px solid #e0e0e0; padding-top: 16px;">⭐ 常用 <span class="count">5</span></div>
            </div>
            <div class="content">
                <div class="content-header">
                    <span class="content-title">服务器账号</span>
                    <div class="stats">
                        <div class="stat-item"><div class="stat-value">23</div><div class="stat-label">总凭证</div></div>
                        <div class="stat-item"><div class="stat-value">15</div><div class="stat-label">团队共享</div></div>
                        <div class="stat-item"><div class="stat-value">8</div><div class="stat-label">个人</div></div>
                    </div>
                </div>
                <div class="credentials-list">
                    <div class="cred-card">
                        <div class="cred-info">
                            <div class="cred-icon">🖥️</div>
                            <div class="cred-details">
                                <div class="cred-name">生产服务器 - 订单服务</div>
                                <div class="cred-meta">
                                    <span>🌐 124.220.224.223</span>
                                    <span>👤 ubuntu</span>
                                    <span class="tag team">团队共享</span>
                                    <span>👥 8 人访问</span>
                                </div>
                            </div>
                        </div>
                        <div class="cred-actions">
                            <button class="action-btn">👁️ 查看</button>
                            <button class="action-btn primary">🔑 使用</button>
                            <button class="action-btn">✏️ 编辑</button>
                        </div>
                    </div>
                    <div class="cred-card">
                        <div class="cred-info">
                            <div class="cred-icon">🖥️</div>
                            <div class="cred-details">
                                <div class="cred-name">测试服务器</div>
                                <div class="cred-meta">
                                    <span>🌐 192.168.1.100</span>
                                    <span>👤 root</span>
                                    <span class="tag team">团队共享</span>
                                    <span>👥 12 人访问</span>
                                </div>
                            </div>
                        </div>
                        <div class="cred-actions">
                            <button class="action-btn">👁️ 查看</button>
                            <button class="action-btn primary">🔑 使用</button>
                            <button class="action-btn">✏️ 编辑</button>
                        </div>
                    </div>
                    <div class="cred-card">
                        <div class="cred-info">
                            <div class="cred-icon">🖥️</div>
                            <div class="cred-details">
                                <div class="cred-name">数据库服务器</div>
                                <div class="cred-meta">
                                    <span>🌐 10.0.0.50</span>
                                    <span>👤 admin</span>
                                    <span class="tag lock">🔐 需审批</span>
                                    <span>👥 3 人访问</span>
                                </div>
                            </div>
                        </div>
                        <div class="cred-actions">
                            <button class="action-btn">👁️ 查看</button>
                            <button class="action-btn primary">🔑 使用</button>
                            <button class="action-btn">✏️ 编辑</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
