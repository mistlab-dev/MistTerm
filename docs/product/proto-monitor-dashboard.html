<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MistTerm - 实时监控</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; background: #f0f0f0; padding: 20px; }
        .window { background: #fff; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.25); width: 1200px; height: 700px; margin: 0 auto; display: flex; flex-direction: column; overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 16px; font-weight: 500; }
        .header-actions { display: flex; gap: 12px; align-items: center; }
        .header-btn { background: rgba(255,255,255,0.2); border: none; color: #fff; padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; }
        .refresh-status { font-size: 12px; opacity: 0.9; }
        .main { flex: 1; display: flex; }
        .sidebar { width: 200px; background: #fafafa; border-right: 1px solid #e0e0e0; padding: 16px 0; }
        .sidebar-item { padding: 10px 16px; font-size: 13px; color: #555; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .sidebar-item:hover { background: #f0f0f0; }
        .sidebar-item.active { background: #e8f0fe; color: #1967d2; }
        .sidebar-item .alert-dot { width: 8px; height: 8px; background: #f44336; border-radius: 50%; margin-left: auto; }
        .content { flex: 1; display: flex; flex-direction: column; padding: 24px; }
        .team-info { background: #f8f9fa; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .team-name { font-size: 14px; font-weight: 600; color: #333; }
        .team-stats { display: flex; gap: 24px; font-size: 12px; color: #666; }
        .alert-badge { background: #fce8e6; color: #c5221f; padding: 4px 12px; border-radius: 16px; font-size: 12px; display: flex; align-items: center; gap: 4px; }
        .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 20px; }
        .metric-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 20px; text-align: center; }
        .metric-value { font-size: 32px; font-weight: 600; color: #333; margin-bottom: 8px; }
        .metric-label { font-size: 13px; color: #666; margin-bottom: 12px; }
        .progress-bar { width: 100%; height: 8px; background: #e0e0e0; border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
        .progress-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
        .progress-fill.cpu { background: linear-gradient(90deg, #4CAF50, #8BC34A); }
        .progress-fill.memory { background: linear-gradient(90deg, #2196F3, #64B5F6); }
        .progress-fill.disk { background: linear-gradient(90deg, #FF9800, #FFC107); }
        .metric-trend { font-size: 11px; color: #999; }
        .chart-section { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 20px; flex: 1; }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .chart-title { font-size: 14px; font-weight: 600; color: #333; }
        .chart-placeholder { height: 200px; background: linear-gradient(180deg, #f5f5f5 0%, #fff 100%); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: #999; font-size: 13px; }
    </style>
</head>
<body>
    <div class="window">
        <div class="header">
            <h1>📊 实时监控</h1>
            <div class="header-actions">
                <span class="refresh-status">🔄 自动刷新：5s</span>
                <button class="header-btn">设置</button>
                <button class="header-btn">分享</button>
            </div>
        </div>
        <div class="main">
            <div class="sidebar">
                <div class="sidebar-item active">🖥️ 生产环境 <span class="alert-dot"></span></div>
                <div class="sidebar-item">🖥️ 测试环境</div>
                <div class="sidebar-item">🖥️ 开发环境</div>
                <div class="sidebar-item" style="margin-top: 20px; border-top: 1px solid #e0e0e0; padding-top: 16px;">👥 团队监控</div>
            </div>
            <div class="content">
                <div class="team-info">
                    <span class="team-name">技术部研发一组 | 12 台服务器</span>
                    <div class="team-stats">
                        <span>👥 12 人订阅</span>
                        <span class="alert-badge">⚠️ 2 个告警</span>
                    </div>
                </div>
                <div class="metrics-grid">
                    <div class="metric-card">
                        <div class="metric-value">45%</div>
                        <div class="metric-label">CPU 使用率</div>
                        <div class="progress-bar"><div class="progress-fill cpu" style="width: 45%"></div></div>
                        <div class="metric-trend">↑ 2% 最近 1 小时</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value">62%</div>
                        <div class="metric-label">内存使用率</div>
                        <div class="progress-bar"><div class="progress-fill memory" style="width: 62%"></div></div>
                        <div class="metric-trend">↑ 5% 最近 1 小时</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value">78%</div>
                        <div class="metric-label">磁盘使用率</div>
                        <div class="progress-bar"><div class="progress-fill disk" style="width: 78%"></div></div>
                        <div class="metric-trend">↑ 1% 最近 24 小时</div>
                    </div>
                </div>
                <div class="chart-section">
                    <div class="chart-header">
                        <span class="chart-title">📈 网络流量</span>
                        <select style="padding: 4px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 12px;">
                            <option>最近 1 小时</option>
                            <option>最近 6 小时</option>
                            <option>最近 24 小时</option>
                        </select>
                    </div>
                    <div class="chart-placeholder">
                        📊 网络流量图表 (1.5MB/s 上传 | 856KB/s 下载)
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
