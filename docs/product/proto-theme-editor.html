<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MistTerm - 主题编辑器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; background: #f0f0f0; padding: 20px; }
        .window { background: #fff; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.25); width: 1100px; height: 650px; margin: 0 auto; display: flex; flex-direction: column; overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 16px; font-weight: 500; }
        .main { flex: 1; display: flex; }
        .sidebar { width: 250px; background: #fafafa; border-right: 1px solid #e0e0e0; padding: 16px 0; }
        .theme-item { padding: 12px 16px; cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .theme-item:hover { background: #f0f0f0; }
        .theme-item.active { background: #e8f0fe; }
        .theme-color { width: 24px; height: 24px; border-radius: 6px; border: 2px solid #ddd; }
        .theme-name { font-size: 13px; color: #333; flex: 1; }
        .theme-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #e6f4ea; color: #137333; }
        .content { flex: 1; display: flex; }
        .editor-panel { flex: 1; padding: 24px; overflow-y: auto; }
        .preview-panel { width: 350px; background: #1e1e1e; padding: 24px; display: flex; flex-direction: column; }
        .section-title { font-size: 14px; font-weight: 600; color: #333; margin-bottom: 16px; }
        .color-row { display: flex; gap: 16px; margin-bottom: 16px; }
        .color-item { flex: 1; }
        .color-label { font-size: 12px; color: #666; margin-bottom: 8px; }
        .color-input { display: flex; align-items: center; gap: 8px; }
        .color-preview { width: 40px; height: 40px; border-radius: 6px; border: 2px solid #ddd; }
        .color-value { font-size: 12px; color: #333; font-family: 'SF Mono', monospace; }
        .font-row { display: flex; gap: 16px; margin-bottom: 16px; }
        .font-item { flex: 1; }
        .font-label { font-size: 12px; color: #666; margin-bottom: 8px; }
        .font-select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
        .slider-row { margin-bottom: 16px; }
        .slider-label { font-size: 12px; color: #666; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .slider { width: 100%; height: 6px; border-radius: 3px; background: #e0e0e0; outline: none; -webkit-appearance: none; }
        .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #667eea; cursor: pointer; }
        .terminal-preview { background: #1e1e1e; border-radius: 8px; padding: 16px; flex: 1; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; color: #d4d4d4; overflow: hidden; }
        .terminal-header { display: flex; gap: 6px; margin-bottom: 12px; }
        .terminal-dot { width: 12px; height: 12px; border-radius: 50%; }
        .terminal-dot.red { background: #ff5f56; }
        .terminal-dot.yellow { background: #ffbd2e; }
        .terminal-dot.green { background: #27c93f; }
        .terminal-line { margin-bottom: 4px; }
        .terminal-prompt { color: #4CAF50; }
        .terminal-cmd { color: #667eea; }
        .terminal-output { color: #999; }
        .btn { padding: 10px 20px; border-radius: 6px; font-size: 13px; cursor: pointer; border: none; }
        .btn-primary { background: #667eea; color: #fff; }
        .btn-secondary { background: #f5f5f5; color: #666; margin-left: 8px; }
        .editor-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; padding-top: 20px; border-top: 1px solid #e0e0e0; }
    </style>
</head>
<body>
    <div class="window">
        <div class="header">
            <h1>🎨 主题编辑器</h1>
            <div style="display: flex; gap: 8px;">
                <button class="btn btn-secondary" style="background: rgba(255,255,255,0.2); color: #fff;">导入</button>
                <button class="btn btn-primary" style="background: #4CAF50;">保存主题</button>
            </div>
        </div>
        <div class="main">
            <div class="sidebar">
                <div class="theme-item active">
                    <div class="theme-color" style="background: #1e1e1e;"></div>
                    <span class="theme-name">暗夜</span>
                    <span class="theme-badge">当前</span>
                </div>
                <div class="theme-item">
                    <div class="theme-color" style="background: #fff;"></div>
                    <span class="theme-name">晨曦</span>
                </div>
                <div class="theme-item">
                    <div class="theme-color" style="background: #0d1117;"></div>
                    <span class="theme-name">深海</span>
                </div>
                <div class="theme-item">
                    <div class="theme-color" style="background: #282c34;"></div>
                    <span class="theme-name">森林</span>
                </div>
                <div class="theme-item" style="margin-top: 20px; border-top: 1px solid #e0e0e0; padding-top: 16px;">
                    <span class="theme-name">+ 新建主题</span>
                </div>
            </div>
            <div class="content">
                <div class="editor-panel">
                    <div class="section-title">颜色设置</div>
                    <div class="color-row">
                        <div class="color-item">
                            <div class="color-label">背景色</div>
                            <div class="color-input">
                                <div class="color-preview" style="background: #1e1e1e;"></div>
                                <span class="color-value">#1e1e1e</span>
                            </div>
                        </div>
                        <div class="color-item">
                            <div class="color-label">前景色</div>
                            <div class="color-input">
                                <div class="color-preview" style="background: #d4d4d4;"></div>
                                <span class="color-value">#d4d4d4</span>
                            </div>
                        </div>
                        <div class="color-item">
                            <div class="color-label">光标色</div>
                            <div class="color-input">
                                <div class="color-preview" style="background: #00ff00;"></div>
                                <span class="color-value">#00ff00</span>
                            </div>
                        </div>
                    </div>
                    <div class="color-row">
                        <div class="color-item">
                            <div class="color-label">选中背景</div>
                            <div class="color-input">
                                <div class="color-preview" style="background: #264f78;"></div>
                                <span class="color-value">#264f78</span>
                            </div>
                        </div>
                        <div class="color-item">
                            <div class="color-label">链接色</div>
                            <div class="color-input">
                                <div class="color-preview" style="background: #3794ff;"></div>
                                <span class="color-value">#3794ff</span>
                            </div>
                        </div>
                        <div class="color-item">
                            <div class="color-label">强调色</div>
                            <div class="color-input">
                                <div class="color-preview" style="background: #667eea;"></div>
                                <span class="color-value">#667eea</span>
                            </div>
                        </div>
                    </div>
                    <div class="section-title" style="margin-top: 32px;">字体设置</div>
                    <div class="font-row">
                        <div class="font-item">
                            <div class="font-label">字体族</div>
                            <select class="font-select"><option>Fira Code</option><option>SF Mono</option><option>JetBrains Mono</option></select>
                        </div>
                        <div class="font-item">
                            <div class="font-label">字体大小</div>
                            <select class="font-select"><option>12px</option><option>13px</option><option selected>14px</option><option>15px</option></select>
                        </div>
                        <div class="font-item">
                            <div class="font-label">行高</div>
                            <select class="font-select"><option>1.3</option><option selected>1.5</option><option>1.7</option></select>
                        </div>
                    </div>
                    <div class="section-title" style="margin-top: 32px;">其他设置</div>
                    <div class="slider-row">
                        <div class="slider-label"><span>透明度</span><span>90%</span></div>
                        <input type="range" class="slider" min="50" max="100" value="90">
                    </div>
                    <div class="slider-row">
                        <div class="slider-label"><span>字体粗细</span><span>400</span></div>
                        <input type="range" class="slider" min="100" max="900" value="400">
                    </div>
                    <div class="editor-actions">
                        <button class="btn btn-secondary">重置</button>
                        <button class="btn btn-primary">应用主题</button>
                    </div>
                </div>
                <div class="preview-panel">
                    <div class="section-title" style="color: #fff;">实时预览</div>
                    <div class="terminal-preview">
                        <div class="terminal-header">
                            <div class="terminal-dot red"></div>
                            <div class="terminal-dot yellow"></div>
                            <div class="terminal-dot green"></div>
                        </div>
                        <div class="terminal-line">
                            <span class="terminal-prompt">➜</span> <span class="terminal-cmd">~</span> <span class="terminal-cmd">git status</span>
                        </div>
                        <div class="terminal-line terminal-output">On branch main</div>
                        <div class="terminal-line terminal-output">Your branch is up to date</div>
                        <div class="terminal-line">
                            <span class="terminal-prompt">➜</span> <span class="terminal-cmd">~</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
