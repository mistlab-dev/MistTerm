name: Build & Test

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: "0"
  BIN_NAME: Mist

jobs:
  # 三平台并行。单元测试 + 集成测试仅在 Linux（mold + 系统 OpenSSL，最快）；
  # Windows / macOS 只 release 构建 + 打包，依赖 rust-cache 复用增量编译。
  platform:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            rust_targets: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            cargo_features: ""
            run_unit_tests: true
            run_integration_tests: true
            use_mold: true

          - platform: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            rust_targets: x86_64-pc-windows-msvc
            archive_ext: zip
            cargo_features: vendored-openssl
            run_unit_tests: false
            run_integration_tests: false
            use_mold: false

          - platform: macos-universal
            os: macos-latest
            target: universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            archive_ext: dmg
            cargo_features: vendored-openssl
            run_unit_tests: false
            run_integration_tests: false
            use_mold: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify release tag is on main
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$(git rev-parse HEAD)" origin/main; then
            echo "::error::Release tags must point to a commit on main. Merge to main before tagging."
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: mistterm
          key: ${{ matrix.platform }}-${{ matrix.cargo_features || 'default' }}
          cache-on-failure: true

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config mold \
            libssl-dev libssh2-1-dev \
            libx11-dev libxkbcommon-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libfontconfig1-dev libgtk-3-dev libdbus-1-dev \
            openssh-server lrzsz

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install libssh2 pkg-config

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Run unit tests (Linux)
        if: matrix.run_unit_tests
        shell: bash
        env:
          RUSTFLAGS: ${{ matrix.use_mold && '-C link-arg=-fuse-ld=mold' || '' }}
        run: |
          set -euo pipefail
          features="${{ matrix.cargo_features }}"
          features_arg=()
          if [ -n "$features" ]; then
            features_arg=(--features "$features")
          fi
          cargo test --release --lib --tests "${features_arg[@]}"
          cargo test --release --examples "${features_arg[@]}"

      - name: Setup SSH test server
        if: matrix.run_integration_tests
        run: |
          sudo mkdir -p /var/run/sshd
          sudo useradd -m -s /bin/bash mistterm_test || true
          echo "mistterm_test:test123456" | sudo chpasswd
          sudo service ssh start

      - name: Run integration tests
        if: matrix.run_integration_tests
        shell: bash
        env:
          RUSTFLAGS: ${{ matrix.use_mold && '-C link-arg=-fuse-ld=mold' || '' }}
        run: |
          set -euo pipefail
          cargo test --release --test zmodem_integration_test
          cargo test --release --test zmodem_integration_test test_ssh_connect -- --ignored --exact

      - name: Quick syntax check (all platforms)
        shell: bash
        run: |
          set -euo pipefail
          features="${{ matrix.cargo_features }}"
          features_arg=()
          if [ -n "$features" ]; then
            features_arg=(--features "$features")
          fi
          cargo check --bin "$BIN_NAME" "${features_arg[@]}"

      - name: Build release binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          RUSTFLAGS: ${{ matrix.use_mold && '-C link-arg=-fuse-ld=mold' || '' }}
        run: |
          set -euo pipefail
          features="${{ matrix.cargo_features }}"
          features_arg=()
          if [ -n "$features" ]; then
            features_arg=(--features "$features")
          fi

          if [ "${{ matrix.target }}" = "universal-apple-darwin" ]; then
            cargo build --release --bin "$BIN_NAME" --target aarch64-apple-darwin "${features_arg[@]}"
            cargo build --release --bin "$BIN_NAME" --target x86_64-apple-darwin "${features_arg[@]}"
            mkdir -p "target/${{ matrix.target }}/release"
            lipo -create -output \
              "target/${{ matrix.target }}/release/$BIN_NAME" \
              "target/aarch64-apple-darwin/release/$BIN_NAME" \
              "target/x86_64-apple-darwin/release/$BIN_NAME"
            file "target/${{ matrix.target }}/release/$BIN_NAME"
          else
            cargo build --release --bin "$BIN_NAME" --target "${{ matrix.target }}" "${features_arg[@]}"
          fi

      - name: Build release binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $features = "${{ matrix.cargo_features }}"
          $featuresArg = @()
          if ($features) { $featuresArg = @("--features", $features) }
          cargo build --release --bin $env:BIN_NAME --target "${{ matrix.target }}" @featuresArg
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          choco install innosetup -y --no-progress
          $iscc = "$env:LOCALAPPDATA\Programs\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" }
          if (-not (Test-Path $iscc)) { throw "ISCC not found after Inno Setup install" }
          powershell -ExecutionPolicy Bypass -File scripts/package-windows-installer.ps1 -SkipBuild -Target "${{ matrix.target }}" -IsccPath $iscc

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          NAME="$BIN_NAME-${{ matrix.platform }}"
          mkdir -p dist

          if [ "${{ matrix.archive_ext }}" = "dmg" ]; then
            MIST_BINARY="target/${{ matrix.target }}/release/$BIN_NAME" \
              bash scripts/bundle-macos.sh
            artifact="$NAME.dmg"
            bash scripts/package-macos-dmg.sh "target/release/Mist.app" "dist/$artifact"
          else
            STAGE="dist/$NAME"
            mkdir -p "$STAGE"

            if [ "${{ runner.os }}" = "Windows" ]; then
              cp "target/${{ matrix.target }}/release/$BIN_NAME.exe" "$STAGE/"
            else
              cp "target/${{ matrix.target }}/release/$BIN_NAME" "$STAGE/"
            fi
            [ -f README.md ] && cp README.md "$STAGE/" || true
            [ -f docs/en/INSTALL.md ] && cp docs/en/INSTALL.md "$STAGE/INSTALL.md" || true
            [ -f docs/zh/INSTALL.md ] && cp docs/zh/INSTALL.md "$STAGE/INSTALL.zh.md" || true
            [ -f LICENSE ] && cp LICENSE "$STAGE/" || true

            cd dist
            if [ "${{ matrix.archive_ext }}" = "zip" ]; then
              7z a -tzip "$NAME.zip" "$NAME" >/dev/null
              artifact="$NAME.zip"
            else
              tar -czf "$NAME.tar.gz" "$NAME"
              artifact="$NAME.tar.gz"
            fi
            cd ..
          fi

          echo "ARTIFACT_PATH=dist/$artifact" >> "$GITHUB_ENV"
          echo "ARTIFACT_NAME=$artifact" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error

      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: MistTerm-windows-x86_64-setup
          path: dist/MistTerm-*-windows-x86_64-setup.exe
          if-no-files-found: error

  release:
    name: Publish Release
    needs: platform
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            ## Downloads

            Pick the archive for your platform:

            - **macOS**: `Mist-macos-universal.dmg` — open the disk image and drag Mist into Applications
            - **Linux**: `Mist-linux-x86_64.tar.gz`
            - **Windows**: `MistTerm-*-windows-x86_64-setup.exe` (recommended) or `Mist-windows-x86_64.zip`

            - Website: https://mistlab.dev
            - Documentation: https://github.com/mistlab-dev/MistTerm/tree/main/docs
            - Issues: https://github.com/mistlab-dev/MistTerm/issues
