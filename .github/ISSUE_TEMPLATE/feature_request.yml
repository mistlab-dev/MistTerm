name: Feature Request
description: Suggest an idea or improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem you want solved and your proposed solution.

        请说明你想解决的问题，以及期望的行为或方案。

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What pain point or missing capability are you hitting?
      placeholder: I'm always frustrated when ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: It would help if MistTerm could ...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional — other tools or workarounds you tried

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Terminal / SSH
        - SFTP / file transfer
        - Snippets / fragments
        - Team / cloud sync
        - AI assistant
        - UI / UX
        - Other
    validations:
      required: true
