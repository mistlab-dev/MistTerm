[package]
name = "mistterm"
version = "0.3.0"
edition = "2021"
description = "A native GUI SSH terminal emulator with multi-session support"

[dependencies]
# GUI
eframe = "0.23"
egui = "0.23"

# SSH
ssh2 = "0.9.4"

# Terminal emulation
vte = "0.11"

# Config
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Async
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }

# Error handling
anyhow = "1.0"

# Misc
parking_lot = "0.12"
